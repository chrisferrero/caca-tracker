<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1C322D" />
  <title>Journal du chien</title>

  <!-- Typos du design : Inter (display), Playfair Display (body), JetBrains Mono (labels) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@500;600&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🐕</text></svg>" />
</head>
<body>
  <!-- Décor ambiant (calques derrière le contenu) -->
  <div class="bg-layer" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
    <span class="blob blob-3"></span>
  </div>

  <div class="app">
    <!-- ======================= AUJOURD'HUI ======================= -->
    <main id="view-today" class="view" aria-label="Aujourd'hui">
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">🐕</span>
          <span class="brand-name">Journal du chien</span>
        </div>
        <span class="label topbar-date" id="topbar-date">—</span>
      </header>

      <!-- HERO : l'info la plus importante -->
      <section class="card hero" id="status-card">
        <p class="label hero-label" id="hero-label">AUJOURD'HUI</p>
        <div class="hero-main">
          <div class="hero-ring" id="hero-ring">
            <span class="hero-emoji" id="status-icon">🐾</span>
          </div>
          <div class="hero-text">
            <h1 class="hero-title" id="status-title">…</h1>
            <p class="hero-sub" id="status-sub"></p>
          </div>
        </div>
      </section>

      <!-- BENTO : série + compteur -->
      <div class="bento">
        <section class="card stat-card">
          <p class="label">SÉRIE EN COURS</p>
          <p class="stat-num"><span id="streak-num">0</span><span class="stat-unit">j</span></p>
          <div class="week-dots" id="week-dots" aria-label="Cette semaine"></div>
        </section>

        <section class="card stat-card stat-card--accent">
          <p class="label">AUJOURD'HUI</p>
          <p class="stat-num"><span id="count-num">0</span><span class="stat-emoji">💩</span></p>
          <p class="stat-hint" id="count-hint">passage</p>
        </section>
      </div>

      <!-- CTA principal -->
      <button id="btn-add" class="cta" type="button">
        <span class="cta-emoji">💩</span>
        <span>Caca fait</span>
      </button>

      <!-- Actions secondaires -->
      <div class="today-actions">
        <button id="btn-forgot" class="btn-ghost" type="button">🕐 Ajouter un oubli</button>
        <button id="btn-undo" class="btn-ghost" type="button" hidden>↩︎ Annuler</button>
      </div>

      <!-- Panneau : caca oublié -->
      <form id="forgot-form" class="card forgot-form" hidden>
        <label for="forgot-time" class="label">HEURE DU CACA OUBLIÉ</label>
        <div class="forgot-row">
          <input id="forgot-time" class="forgot-input" type="time" required />
          <button type="submit" class="forgot-submit">Ajouter</button>
        </div>
      </form>

      <!-- Passages du jour -->
      <section class="card timeline" id="timeline-card" hidden>
        <p class="label">PASSAGES DU JOUR</p>
        <ul id="today-list" class="today-list"></ul>
      </section>
    </main>

    <!-- ======================= HISTORIQUE ======================= -->
    <main id="view-history" class="view" aria-label="Historique" hidden>
      <header class="topbar">
        <div class="brand">
          <span class="brand-mark">📖</span>
          <span class="brand-name">Historique</span>
        </div>
      </header>
      <div id="history-content" class="history-content"></div>
    </main>

    <!-- ======================= NAVIGATION ======================= -->
    <nav class="tabbar" aria-label="Navigation principale">
      <button class="tab is-active" data-view="today" type="button">
        <span class="tab-icon">🏠</span>
        <span class="tab-label">Aujourd'hui</span>
      </button>
      <button class="tab" data-view="history" type="button">
        <span class="tab-icon">📅</span>
        <span class="tab-label">Historique</span>
      </button>
    </nav>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
