<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#FBE4D6" />
  <title>Caca de Tootsie</title>

  <!-- Carte : Leaflet + tuiles OpenStreetMap (gratuit, sans clé) -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" type="image/png" href="app-icon-180.png" />
  <link rel="apple-touch-icon" href="app-icon-180.png" />
</head>
<body>
  <div class="bg-layer" aria-hidden="true">
    <span class="blob blob-1"></span>
    <span class="blob blob-2"></span>
  </div>

  <div class="app">
    <!-- ======================= EN-TÊTE ======================= -->
    <header class="app-header">
      <div class="app-headings">
        <h1 class="app-title">Caca de Tootsie</h1>
        <p class="app-sub">Le suivi des besoins 🐾</p>
      </div>
      <img class="avatar" src="avatar.png" alt="Tootsie" />
    </header>

    <!-- ======================= NAVIGATION ======================= -->
    <nav class="tabbar" aria-label="Navigation principale">
      <button class="tab is-active" data-view="today" type="button">Aujourd'hui</button>
      <button class="tab" data-view="history" type="button">Historique</button>
    </nav>

    <!-- ======================= AUJOURD'HUI ======================= -->
    <main id="view-today" class="view" aria-label="Aujourd'hui">
      <!-- Carte "jours consécutifs" -->
      <section class="card streak-card">
        <div class="streak-main">
          <img class="flame" id="flame" src="icons/flame.svg" alt="" aria-hidden="true" />
          <div class="streak-text">
            <span class="streak-num" id="streak-num">0</span>
            <span class="streak-label">Jours consécutifs</span>
          </div>
        </div>
        <p class="streak-hint" id="streak-hint">Commencez la série aujourd'hui !</p>
        <div class="week-row" id="week-row" aria-label="Cette semaine"></div>
      </section>

      <!-- Carte du jour -->
      <section class="card today-card">
        <div class="today-head">
          <span class="label" id="today-label">AUJOURD'HUI</span>
          <button id="btn-forgot" class="link-btn" type="button">🕐 Ajouter un oubli</button>
        </div>

        <h2 class="today-title" id="today-title">…</h2>

        <div class="type-counters">
          <div class="type-counter tc--normal">
            <span class="tc-num" id="count-normal">0</span>
            <span class="tc-lbl">Normal</span>
          </div>
          <div class="type-counter tc--malade">
            <span class="tc-num" id="count-malade">0</span>
            <span class="tc-lbl">Malade</span>
          </div>
        </div>

        <!-- Panneau oubli (heure + type) -->
        <form id="forgot-form" class="forgot-form" hidden>
          <label for="forgot-time" class="label">HEURE DU CACA OUBLIÉ</label>
          <input id="forgot-time" class="forgot-input" type="time" required />
          <p class="forgot-q">Type ?</p>
          <div class="forgot-types">
            <button type="button" class="type-btn tb--normal" data-type="normal">🟢 Normal</button>
            <button type="button" class="type-btn tb--malade" data-type="malade">🤢 Malade</button>
          </div>
        </form>

        <ul class="today-list" id="today-list"></ul>
      </section>
    </main>

    <!-- ======================= HISTORIQUE ======================= -->
    <main id="view-history" class="view" aria-label="Historique" hidden>
      <!-- Récap global par type -->
      <div id="type-summary" class="type-summary card" hidden>
        <div class="ts-item ts--normal">
          <span class="ts-num" id="sum-normal">0</span>
          <span class="ts-lbl">Normaux</span>
        </div>
        <div class="ts-sep"></div>
        <div class="ts-item ts--malade">
          <span class="ts-num" id="sum-malade">0</span>
          <span class="ts-lbl">Malades</span>
        </div>
      </div>

      <div class="cal-nav">
        <button id="cal-prev" class="cal-arrow" type="button" aria-label="Mois précédent">‹</button>
        <span id="cal-month" class="cal-month">—</span>
        <button id="cal-next" class="cal-arrow" type="button" aria-label="Mois suivant">›</button>
      </div>

      <div id="history-content" class="history-content"></div>

      <!-- Détail du jour sélectionné -->
      <section id="day-detail" class="card day-detail">
        <p class="label" id="day-detail-title">—</p>
        <ul id="day-list" class="today-list"></ul>
        <div id="map-wrap" class="map-wrap" hidden>
          <p class="label map-label">📍 OÙ ?</p>
          <div id="map" class="map"></div>
        </div>
      </section>

      <div id="cal-stats" class="cal-stats card" hidden>
        <div class="cal-stats-main">
          <span class="cal-stats-num" id="stats-avg">0</span>
          <span class="cal-stats-label">cacas / jour en moyenne</span>
        </div>
        <p class="cal-stats-sub" id="stats-sub"></p>
      </div>
    </main>
  </div>

  <!-- ======================= CTA fixe ======================= -->
  <button id="btn-add" class="cta" type="button">
    <span>Caca fait</span>
    <img class="cta-emoji" src="icons/caca.svg" alt="" aria-hidden="true" />
  </button>

  <!-- ======================= MODALE : type de caca ======================= -->
  <div id="type-modal" class="modal" hidden>
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-card" role="dialog" aria-label="Type de caca">
      <p class="modal-title">Quel type de caca ?</p>
      <div class="modal-options">
        <button class="type-btn tb--normal" data-type="normal" type="button">
          <span class="tb-emoji">🟢</span> Normal
        </button>
        <button class="type-btn tb--malade" data-type="malade" type="button">
          <span class="tb-emoji">🤢</span> Malade
        </button>
      </div>
      <button class="modal-cancel" id="modal-cancel" type="button">Annuler</button>
    </div>
  </div>

  <script type="module" src="js/app.js"></script>
</body>
</html>
